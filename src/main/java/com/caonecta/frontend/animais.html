<!DOCTYPE html>
<html>
<head>
    <title>Animais</title>
</head>
<body>

<h1>Animais Disponíveis</h1>

<div id="lista"></div>

<script>
    fetch('http://localhost:8080/animais/disponiveis')
        .then(res => res.json())
        .then(data => {

            let html = '';

            data.forEach(animal => {
                html += `
            <div>
                <h3>${animal.nome}</h3>
                <p>${animal.especie}</p>
                <p>${animal.descricao}</p>
            </div>
        `;
            });

            document.getElementById('lista').innerHTML = html;
        });
</script>

</body>
</html>
